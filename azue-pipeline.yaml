trigger:
  - main
pool: 'default'

variables:
  - group: Sonar-Cloud-Token

stages:
  - stage: "Maven_Build"
    jobs:
      - job:  "build"
        steps:

          - task: SonarCloudPrepare@2
            displayName: Prepare Sonar Cloud Analysis
            inputs:
              SonarCloud: 'Sonar-Cloud-Token'
              organisation: 'opsbyNikhil'
              scannerMode: 'Other'
              projectKey: 'opsbyNikhil_spring-petclinic'
              projectName: 'petclinic'

          - task: Maven@4
            displayName: Prepare maven 
            inputs:
              mavenPOMFile: 'pom.xml'
              goals: 'package sonar:sonar'
              publishJUnitResults: true
              testResultsFiles: '**/surefire-reports/TEST-*.xml'

          - task: SonarQubePublish@2
            inputs:
              pollingTimeoutSec: '300'
 






