name: GitHub-actions

on:
  push:
    branchs: 
      - main

jobs:
  build:
    name: my-spc
    runs-on: self-hosted

    steps:
      - name: gitcheckout
        uses: actions/checkout@v6
    
      - name: maven-build
        run: 'mvn package' 

      - name: sonar-scan
        run: |
          mvn package sonar:sonar \
          -Dsonar.projectKey=opsbyNikhil_spring-petclinic \
          -Dsonar.organization=opsbynikhil \
          -Dsonar.host.url=https://sonarcloud.io/ \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: AWS creddentails
        run: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY_ID }}
          aws-region: ap-south-1

      - name: Upload JAR in S3 Bucket In AWS
        run: |
          aws s3 cp target/* .jar s3://spc-buck-01/
