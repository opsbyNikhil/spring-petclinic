name: Git-Hub Actions

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      build:
        description: "Run Maven Build"
        required: true
        default: "false"

jobs:
  build:
    name: my-spc
    runs-on: self-hosted

    steps:
      - name: Git-Checkout
        uses: actions/checkout@v6

      - name: Build-Maven
        if: ${{ github.event.inouts.build == 'true' }}
        run: "mvn package"

      - name: sonar scan
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      
      - name: Configure AWS credentails
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY_ID }}
          aws-region: ap-south-1

      - name: upload JAR in S3
        run: |
          aws s3 cp target/*.jar s3://spc-buck-01/

      - name: Docker Image
        run: | 
          docker image build -t ${{ secrets.DOCKER_IMAGE }}:${{ secrets.TAG }} .
      
      - name: Trivy scan
        run: |
          trivy image \
          --severity HIGH,CRITICAL \
          ${{ secrets.DOCKER_IMAGE }}:${{ secrets.TAG }}

      - name: Docker Image push to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_ECR_REGION }} | docker login --username ${{ secrets.AWS_ECR_USERNAME }} --password-stdin ${{ secrets.AWS_ECR_PASSWORD }}.dkr.ecr.ap-south-1.amazonaws.com

      - name: Tag Image
        run: |
          docker tag ${{ secrets.DOCKER_IMAGE }}:${{ secrets.TAG }} ${{ secrets.AWS_ECR_PASSWORD }}.dkr.ecr.ap-south-1.amazonaws.com/dev/${{ secrets.DOCKER_IMAGE }}:${{ secrets.TAG }}

      - name: Docker Push Image
        run: |
          docker push ${{ secrets.AWS_ECR_PASSWORD }}.dkr.ecr.ap-south-1.amazonaws.com/dev/${{ secrets.DOCKER_IMAGE }}:${{ secrets.TAG }}

      # - name: Kubernates namespace
      #   run: |
      #     kubectl create namespace spc-dev

      # - name: Kubernates switching into nameespace
      #   run: |
      #     kubectl config set-context --current --namespace=spc-dev

      - name: Kubernates Deploy
        run: |
          kubectl apply -f deploy/