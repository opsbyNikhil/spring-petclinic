trigger:
  - main
pool: 'default'

stages:
  - stage: 'build_stage'
    jobs:
      - job:  "maven"
        steps:
          - task: Maven@4
            inputs:  
              goals:  'package'
              mavenPOMFile: 'pom.xml'
              publishJUnitResults: true
              testresultsFiles: '**/surefire-reports/TEST-*.xml'