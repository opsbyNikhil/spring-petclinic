trigger:
  - main
pool: 'Default'

stages:
  - stage: 'build-stage'
    jobs:
      - job:  "maven"
        steps:
          - task: Maven@4
            inputs:  
              mavenPOMFile: 'pom.xml'
              publishJUnitResults: true
              testresultsFiles: '**/surefire-reports/TEST-*.xml'
              goals:  'package'

              