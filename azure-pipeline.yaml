trigger:
  - main
pool: 'Default'

stages:
  - stage: 'build_stage'
    jobs:
      - job:  "maven"
        steps:
          - task: Maven@4
            inputs:  
              goals:  'package -Dspring.profiles.active=h2'
              mavenPOMFile: 'pom.xml'
              publishJUnitResults: true
              testresultsFiles: '**/surefire-reports/TEST-*.xml'